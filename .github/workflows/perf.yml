name: Performance baseline

on:
  schedule:
    - cron: '0 2 * * *'   # Каждый день в 02:00 UTC
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  benchmarks:
    name: BenchmarkDotNet
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Fetch native dependencies
        shell: pwsh
        run: ./tools/fetch-natives.ps1 -Tier Basic

      - name: Build
        run: dotnet build tests/Foliant.Performance -c Release -warnaserror

      - name: Run benchmarks
        run: >-
          dotnet run --project tests/Foliant.Performance -c Release --no-build --
          --filter "*"
          --exporters json
          --artifacts tests/Foliant.Performance/results

      - name: Compare with baseline
        id: compare
        shell: pwsh
        run: |
          $cmp = dotnet run --project tools/perf-compare -c Release -- `
            --baseline tests/Foliant.Performance/baseline.json `
            --current  tests/Foliant.Performance/results `
            --threshold 15
          $cmp | Tee-Object -FilePath comparison.txt
          # exit code != 0 если регрессия > threshold

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.run_id }}
          path: |
            tests/Foliant.Performance/results
            comparison.txt
          retention-days: 30

      - name: Open regression issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('comparison.txt')
              ? '```\n' + fs.readFileSync('comparison.txt','utf8') + '\n```'
              : 'See workflow run for details.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `perf-regression detected on ${new Date().toISOString().slice(0,10)}`,
              labels: ['perf-regression'],
              body
            });
