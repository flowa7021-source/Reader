name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-test:
    name: Build & Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Fetch native dependencies
        shell: pwsh
        run: ./tools/fetch-natives.ps1 -Quiet

      - name: Restore
        run: dotnet restore Foliant.sln --locked-mode

      - name: Verify formatting
        run: dotnet format Foliant.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Foliant.sln -c Release --no-restore -warnaserror

      - name: Test (fast)
        run: >-
          dotnet test Foliant.sln
          -c Release
          --no-build
          --collect:"XPlat Code Coverage"
          --filter "Category!=Slow&Category!=E2E"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7

      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          files: ./TestResults/**/coverage.cobertura.xml

      - name: Quick perf smoke
        if: github.event_name == 'pull_request'
        run: >-
          dotnet run --project tests/Foliant.Performance -c Release --no-build --
          --quick --filter "*"
        continue-on-error: false
